<mat-toolbar class="protected" style="background-color: gainsboro;">
  <span style="margin-left: 25vw;" preload-src="assets/images/palete.gif" fxLayout="row" >
    <!-- Logo -->
    @if (myDeatilsExist()) {
      <button mat-raised-button
        (click)="onAboutMe()"
        buttonsNavigable
        style="margin: 10px;"
        >Обо мне</button>
    }
  </span>
  <div fxFlex></div>
  <img [src]="imgPreloadUrl" (load)="imgUrl = imgPreloadUrl" hidden>
  <div *ngIf="!(isSignedIn$ | async)"  class="login-button"  >
    <button mat-raised-button
      (click)="onLogin()"
      buttonsNavigable
      style="margin: 10px;"
      >Войти
    </button>
    <button mat-raised-button
      (click)="onRegister()"
      buttonsNavigable
      style="margin: 10px;"
      >Регистрация
    </button>
  </div>
  <div *ngIf="isSignedIn$ | async" class="login-button">
    <button mat-raised-button
      (click)="onFeedback()"
      buttonsNavigable
      style="margin: 10px;"
      >Написать</button>

    <button mat-raised-button
      (click)="onProfile()"
      buttonsNavigable
      style="margin: 10px;"
      >{{profileButtonText}}</button>

    <button mat-raised-button
      (click)="onLogout()"
      buttonsNavigable
      style="margin: 10px;"
      >Выйти</button>
  </div>
</mat-toolbar>
