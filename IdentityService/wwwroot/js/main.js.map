  <form [formGroup]="menuItemForm" (ngSubmit)="onSubmit()" class="menu-form">
    <mat-form-field appearance="outline" color="accent" style="display: flex; flex-direction: column; margin: 10px;">    
      <input
        type="name"
        placeholder="Name"
        required
        formControlName="name"
        matInput 
      />  
      <mat-label>Название</mat-label>
      <mat-error *ngIf="menuItemForm.controls.name.invalid">Обязательное поле
      </mat-error>  
    </mat-form-field>
   
    <mat-checkbox class="menu-form__helpers" formControlName="isActive">
    Показывать
    </mat-checkbox>     

    <button
      type="button"
      mat-raised-button
      color="grey"
      class="menu-form__submit mat-elevation-z12"
      (click)="onSubmit()"
      [disabled]="isDisabled()"
      i18n
    >
    Сохранить
    </button>
  </form>
