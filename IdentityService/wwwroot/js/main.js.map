<!-- <div [ngStyle]="{'width': data.width, 'height': data.height}" fxLayout="column">    
    <h3 style="margin: 15px;" [innerHTML]="text"></h3>
</div> -->

<div style="overflow: hidden;">
    <textarea matInput
        [(ngModel)]="data.text"
        [disabled]="true"
        [ngStyle]="{
            'width': data.width,
            'height': data.height,
            'font-size': data.size,
            'fontFamily': font,
            'color': data.color,
            'font-style': data.style,
            'font-weight': data.weight,
            'text-align': data.align, 
            'border': 'hidden'
            }"
    ></textarea>
</div>
