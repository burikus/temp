<div fxLayout="column" class="sidenav-container">
 
  <button *ngIf="!showProfile" mat-icon-button (click)="snav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-sidenav-container class="sidenav-container background-image">

    <mat-sidenav-content style="width: 100%; padding-left: 1.5rem; padding-right: 1,5rem;" >
      <app-common-entity [menu]="menu">
      </app-common-entity>
    </mat-sidenav-content>

    <mat-sidenav #snav [mode]="mobileQuery.matches ? 'push' : 'side'"
        (opened)="events.push('open!')" (closed)="events.push('close!')"
        style="padding-left: 1rem; padding-right: 1rem;" class="background-image">

      <div *ngIf="menu" class="protected">
        <div *ngFor="let item of menu">
          <form>
            <mat-form-field appearance="fill">
              <mat-label>{{item.name}}</mat-label>
              <mat-select>
                <mat-option *ngFor="let submenu of item.subMenuItems" (click)="onMenuSelected(submenu); snav.toggle()"  class="mat-menu-item2">
                {{submenu.name}}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </form>
        </div>
        <div style="justify-self: center;">
            <button 
              type="button"
              mat-raised-button
              style="width: 160px; border-radius: 3rem; justify-self: center;"
              class="menu-form__submit mat-elevation-z10 mmm"
              (click)="onMenuReset(); snav.toggle()"
              [disabled]="!menuChanged && !(tempCacheService.submenu$ | async)"
              i18n
              >
            Главное меню
            </button>
        </div>
      </div>
    </mat-sidenav>
  </mat-sidenav-container>
</div>
