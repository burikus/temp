<div [ngStyle]="{'width': data.width, 'height': data.height}" fxLayout="column">
    <div fxLayout="row">
        <img *ngIf="data.avatar" class="circle" [ngStyle]="{ 'width.px': 100, 'height.px': 100, 'margin.vh': 3 }" [src]="'data:Image/*;base64,' + data.avatar"/>
        <h1 style="text-align: center; margin: 15px;" [innerHTML]="areaText"></h1>
    </div>
    <textarea matInput [(ngModel)]="text" fxFlex
        [ngStyle]="{ 'margin.px': 10, 'font-size': 16, 'fontFamily': 'Roboto', 'color': 'black' }"
        [value]="text"
        cdkTextareaAutosize
        #autosize="cdkTextareaAutosize"
        cdkAutosizeMinRows="10"
        cdkAutosizeMaxRows="30">
    </textarea>
    <div class="login-button" style="align-self: center;">
        <button mat-raised-button
        (click)="onSubmit()"
        buttonsNavigable
        style="margin: 10px;"
        [disabled]="text.length == 0"
        >Отправить</button>
    </div>
</div>
