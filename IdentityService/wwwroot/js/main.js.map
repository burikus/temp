<ngx-spinner type="square-jelly-box"></ngx-spinner>

<div *ngIf="currentSubmenuName$ | async" fxLayout="row">
  <div fxFlex></div>
  <div fxLayoutAlign="center center" 
    style="height: 30px; border-radius: 5px; font-weight: bold; color: rgb(13, 14, 114);">
    <h1 style="font-family: Caveat, 'Caveat-Bold';">{{currentSubmenuName$ | async}}</h1></div>
  <div fxFlex></div>
</div>

<div *ngIf="textFormats" fxLayout="row" class="wrap-files" fxLayoutAlign="left">
  <div *ngFor="let item of arts$ | async" style="width: 320px; padding-bottom: 1rem;">
    <mat-card fxLayout="column" class="arts-card protected mat-elevation-z8"
        [ngStyle]="{'background-color': 'white'}">
      <span 
        [ngStyle]="{
          'font-size': currentItemFontSize(item.uid, true, false, false),
          'fontFamily': currentItemFont(item.uid, true, false, false),
          'color': currentItemColor(item.uid, true, false, false),
          'text-align': currentItemAlign(item.uid, true, false, false),
          'font-style': currentItemStyle(item.uid, true, false, false),
          'font-weight': currentItemWeight(item.uid, true, false, false),
          'text-decoration': currentItemStroke(item.uid, true, false, false),
        }">
        {{item.text}}</span>
      <div style="align-self: center; padding: 0.3rem" matTooltip="Кликните дважды, чтобы открыть" matTooltipPosition="right">
        <img [src]="'data:Image/*;base64,' + item.pictureImage" style="max-width: 300px; max-height:300px;;" 
          (dblclick)="openArt(item.pictureImage)"/>
      </div>
      <span
        [ngStyle]="{
          'font-size': currentItemFontSize(item.uid, false, true, false),
          'fontFamily': currentItemFont(item.uid, false, true, false)?.replace('-',' '),
          'color': currentItemColor(item.uid, false, true, false),
          'text-align': currentItemAlign(item.uid, false, true, false),
          'font-style': currentItemStyle(item.uid, false, true, false),
          'font-weight': currentItemWeight(item.uid, false, true, false),
          'text-decoration': currentItemStroke(item.uid, false, true, false),
        }">
        {{item.date}}</span>
      <span
        [ngStyle]="{
          'font-size': currentItemFontSize(item.uid, false, false, true),
          'fontFamily': currentItemFont(item.uid, false, false, true)?.replace('-',' '),
          'color': currentItemColor(item.uid, false, false, true),
          'text-align': currentItemAlign(item.uid, false, false, true),
          'font-style': currentItemStyle(item.uid, false, false, true),
          'font-weight': currentItemWeight(item.uid, false, false, true),
          'text-decoration': currentItemStroke(item.uid, false, false, true),
          'padding': '0.3rem'
        }">
        {{item.description}}
      </span>
      <div fxFlex></div>
      <div *ngIf="isSignedIn$ | async" fxLayoutAlign="center">
        <img *ngIf="item.favourite" width="40" height="36" src="assets/images/favourite.png" (click)="updateFavourite(item, false)"/>
        <img *ngIf="!item.favourite" width="40" height="36" src="assets/images/favouriteEmpty.png" (click)="updateFavourite(item, true)"/>
      </div>
    </mat-card>
  </div>
</div>
