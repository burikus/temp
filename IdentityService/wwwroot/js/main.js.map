
<div style="display: flex; flex-direction: column;">
  
  <form [formGroup]="signInForm" (ngSubmit)="onRegister()" fxLayout="column" fxLayoutAlign="center" class="sign-in-form" 
      style="background-image: url({{imgUrl}});">

    <div style="padding-top: 300px;">
      <mat-form-field appearance="outline" color="accent"
          style="display: flex; flex-direction: column; margin-left: 145px; width: 370px; background-color: rgb(231, 231, 110);; 
          border-radius: 25px 25px 25px 25px">
        <mat-icon
          class="sign-in-form__email-icon mat-icon-stroke"
          matPrefix
          svgIcon="mail-sm" 
        ></mat-icon>

        <input style="border-radius: 0px 15px 0px 15px; background-color: rgb(231, 231, 110);"
          type="email"
          placeholder="email"
          required
          matInput 
          formControlName="email"
        />
        <mat-label>email</mat-label>
        <mat-error *ngIf="_email.hasError('required')">Обязательное поле
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" color="accent" 
          style="display: flex; flex-direction: column; margin-left: 100px; margin-top: 10px; width: 370px; 
          background-color: rgb(231, 231, 110); border-radius: 25px 25px 25px 25px">
        <mat-icon
          class="sign-in-form__email-icon mat-icon-stroke"
          matPrefix
          svgIcon="password"
        ></mat-icon>
      
        <input
          style="background-color: rgb(231, 231, 110);"
          [type]="hidePass ? 'password' : 'text'"
          placeholder="Пароль"
          required
          minlength="8"
          matInput
          formControlName="password"
        />

        <button
          type="button"
          mat-icon-button
          matSuffix
          (click)="hidePass = !hidePass"
          [attr.aria-label]="'Скрыть пароль'"
          [attr.aria-pressed]="hidePass"
          [attr.tabIndex]="-1"
          [matTooltip]="hidePass ? 'Показать' : 'Скрыть'"
          i18n-matTooltip
        >
          <mat-icon
            class="sign-in-form__visibility-icon mat-icon-stroke"
            aria-hidden="false"
            matPrefix
            [svgIcon]="hidePass ? 'visibility-off' : 'visibility'"
          ></mat-icon>
        </button>
        <mat-label>Пароль</mat-label>
        <mat-error *ngIf="_password.hasError('required')">Обязательное поле
          </mat-error>
        <mat-error *ngIf="_password.hasError('minlength')">Длина пароля не менее 8 символов
          </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" color="accent" 
        style="display: flex; flex-direction: column; margin-left: 80px; margin-top: 10px; width: 370px; 
        background-color: rgb(231, 231, 110); border-radius: 25px 25px 25px 25px">
        <input
          style="background-color: rgb(231, 231, 110);"
          type="name"
          placeholder="Имя"
          required
          formControlName="name"
          matInput 
        />
        <mat-label>Имя</mat-label>
        <mat-error *ngIf="_name.hasError('required')">Обязательное поле
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" color="accent" 
        style="display: flex; flex-direction: column; margin-left: 145px; margin-top: 10px; width: 370px; 
        background-color: rgb(231, 231, 110); border-radius: 25px 25px 25px 25px">
        <input
          style="background-color: rgb(231, 231, 110);"
          type="familyName"
          placeholder="Фамилия"
          matInput 
          formControlName="familyName"
        />
        <mat-label>Фамилия</mat-label>
      </mat-form-field>

      <div style="margin-top: -15px; margin-right: 30px;">
        <button
          style="width: 160px; height: 118px; background-color: transparent; border-radius: 110px 30px 90px 60px;"
          type="button"
          mat-raised-button
          color="grey"
          class="sign-in-form__register mat-elevation-z10"
          (click)="onRegister()"
          i18n
        >
        <p style="margin-top: 30px; color: white; font-weight: bold; font-size: 18px;">Регистрация</p>
        </button>
      </div>
      <div style="margin-top: 50px;"></div>
    </div>
  </form>
</div>
