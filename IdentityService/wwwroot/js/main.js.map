<ngx-spinner type="square-loader"></ngx-spinner>
<div class="flex-container">
  <div>
    <div fxLayout="column"  fxLayoutAlign="center center">
      <mat-card style="top: 0px; z-index: 99; background-color: white; max-width: 600px; text-align: center;">
        <mat-label class="labels protected sticky-top" style="background-color: white; height: 30px;"><h1>Меню</h1></mat-label>
        <div fxLayout="row" class="menu-buttons">
          <button
            type="button"
            mat-raised-button
            style="width: 150px; margin-left: 40px;"
            class="menu-form__submit mat-elevation-z10"
            (click)="onMenuAdd()"
            i18n
          >
          Добавить
          </button>
          <div fxFlex="10vw"></div>
          <button
            type="button"
            mat-raised-button
            style="width: 150px; margin-right: 40px;"
            class="menu-form__submit mat-elevation-z10"
            (click)="onMenuDelete()"
            [disabled]="!removeMenu || !currentMenu"
            i18n
          >
          Удалить
          </button>
        </div>
      </mat-card>

      <div cdkDropList class="menu-list" (cdkDropListDropped)="drop($event)">
          @for (item of menu; track item; let i = $index ) {
            <div class="menu-box" cdkDrag 
              (dblclick)="onMenuDoubleClick(i, item)" 
              (click)="onMenuClick(i, item)"
              [style.background-color]="clicked[i] ? '#e3dede' : 'white'"
              >
              <div class="menu-custom-placeholder" *cdkDragPlaceholder></div>
              {{item.name}}
              <mat-icon
                class="menuitem-form__visibility-icon mat-icon-stroke"
                aria-hidden="false"
                matPostfix
                [svgIcon]="item.isActive ? 'visibility' : 'visibility-off'"
              ></mat-icon>
            </div>
          }
      </div>

      <div style="padding-bottom: 20px;"></div>
      <button
        type="button"
        mat-raised-button
        style="width: 150px;"
        class="menu-form__submit mat-elevation-z10"
        (click)="onMenuSubmit()"
        [disabled]="!menuChanged"
        i18n
      >
      Сохранить
      </button>
    </div>
  </div>
   
  <div>
    <div fxLayout="column"  fxLayoutAlign="center center">
    <mat-card style="top: 0px; z-index: 99; background-color: white; max-width: 600px; text-align: center;">
      <mat-label class="labels protected sticky-top" style="background-color: white; height: 30px;"><h1>Подменю</h1></mat-label>
      <div fxLayout="row" class="menu-buttons">
        <button
          type="button"
          mat-raised-button
          style="width: 150px; margin-left: 40px;"
          class="menu-form__submit mat-elevation-z10"
          (click)="onSubMenuAdd()"
          [disabled]="!currentMenu"
          i18n
        >
        Добавить
        </button>
        <div fxFlex="10vw"></div>
        <button
          type="button"
          mat-raised-button
          style="width: 150px; margin-right: 40px;"
          class="menu-form__submit mat-elevation-z10" 
          (click)="onSubMenuDelete()"
          [disabled]="!removeSubMenu || !currentSubMenu"
          i18n
        >
        Удалить
        </button>
      </div>
    </mat-card>
    <div cdkDropList class="menu-list" (cdkDropListDropped)="dropSub($event)">
          @for (item of subMenu; track item; let i = $index ) {
            <div class="menu-box" cdkDrag 
              (dblclick)="onSubMenuDoubleClick(i, item)" 
              (click)="onSubMenuClick(i, item)"
              [style.background-color]="clickedSub[i] ? '#e3dede' : 'white'"
              >
              <div class="menu-custom-placeholder" *cdkDragPlaceholder></div>
              {{item.name}}
              <mat-icon
                class="menuitem-form__visibility-icon mat-icon-stroke"
                aria-hidden="false"
                matPostfix
                [svgIcon]="item.isActive ? 'visibility' : 'visibility-off'"
              ></mat-icon>
            </div>
          }
      </div>
    </div>
  </div>
</div>
