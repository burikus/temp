<div #container [id]="'circleContainer' + counter" class="circle" [ngStyle]="{ 'width.px': diameter, 'height.px': diameter }">
    <div class="rotation protected" >{{ angle }}</div>
    <div class="circle-handle"
        circularSliderHandle
        [_counter]="counter"
        [diameter]="diameter"
        [(angle)]="angle" >
    </div>
</div>
<!-- [containerElement]="container" -->
