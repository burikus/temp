<div *ngIf="showProfile">
  <app-user-profile appDragDrop>
    <!-- <router-outlet></router-outlet> -->
  </app-user-profile>
</div>

<div *ngIf="!showProfile">
  <div *ngIf="isAdmin$ | async">
    <img [src]="delPreloadUrl" (load)="delUrl = delPreloadUrl" hidden>
    <img [src]="addPreloadUrl" (load)="addUrl = addPreloadUrl" hidden>
    <img [src]="delP2reloadUrl" (load)="del2Url = del2PreloadUrl" hidden>
    <img [src]="eyeOpenPreloadUrl" (load)="eyeOpenUrl = eyeOpenPreloadUrl" hidden>
    <img [src]="eyeClosePreloadUrl" (load)="eyeCloseUrl = eyeClosePreloadUrl" hidden>
    <app-admin-common-entity style="background-color: whitesmoke;">
    </app-admin-common-entity>
  </div>
  <div *ngIf="!(isAdmin$ | async)">
    <img [src]="transparentPreloadUrl" (load)="transparentUrl = transparentPreloadUrl" hidden>
    <app-sidenav style="background-image: url('{{transparentUrl}}');">
    </app-sidenav>
  </div>
</div>
