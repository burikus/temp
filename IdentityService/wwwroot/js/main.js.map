<ngx-spinner type="square-loader"></ngx-spinner>
<mat-drawer-container autosize>

  <mat-drawer fxFlex mode="side" opened class="menu-list" >
    <div fxLayout="column" fxLayoutAlign="center center">
      <button
        type="button"
        mat-raised-button
        style="width: 150px;"
        class="menu-form__submit mat-elevation-z10"
        (click)="resetMenu()"
        i18n 
      >
      Без меню
      </button>
      <div *ngIf="menu">
        <div *ngFor="let item of menu">
          <form>
            <mat-form-field appearance="fill" class="mat-menu-item">
              <mat-label>{{item.name}}</mat-label>
              <mat-select>
                <mat-option *ngFor="let submenu of item.subMenuItems" (click)="onSubmenuSelected(submenu);">
                  <img *ngIf="submenu.isActive" width="24" src="assets/images/eyeOpen.png"/>
                  <img *ngIf="!submenu.isActive" width="24" src="assets/images/eyeClose.png"/>
                  {{submenu.name}}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </form>
        </div>
      </div>

      <div style="padding-bottom: 20px;"></div>
      <button
        type="button"
        mat-raised-button
        style="width: 150px;"
        class="menu-form__submit mat-elevation-z10"
        (click)="onSortingSubmit()"
        [disabled]="!change"
        i18n
      >
      Сохранить
      </button>
    </div>
  </mat-drawer>

  <mat-drawer-content style="padding: 10px;">
    <div class="sticky-top" style="text-align: left; margin: 20px;" fxLayout="row">
      <mat-slider min="100" max="500" step="10" showTickMarks discrete [displayWith]="formatLabel.bind(this)">
        <input matSliderThumb>
      </mat-slider>
      <mat-label class="protected" style="margin-left: 20px;"><h1>{{currentSubmenu?.name ?? 'Без меню'}}</h1></mat-label>
    </div>
    <div class="arts-container protected" cdkDropListGroup [ngStyle]="{ '--box-width': boxWidth, '--box-height': boxHeight }">
      <div cdkDropList
        (cdkDropListEntered)="onDropListEntered($event)"
        (cdkDropListDropped)="onDropListDropped()"
      ></div>
      <div cdkDropList
        (cdkDropListEntered)="onDropListEntered($event)"
        (cdkDropListDropped)="onDropListDropped()"
        *ngFor="let item of updatedArts"
      >
      <div cdkDrag>
        <mat-card layout="column" class="item-box mat-elevation-z10">
          <div fxLayoutAlign="center center">
            <img [src]="'data:Image/*;base64,' + item.pictureImage" [ngStyle]="{ 'max-width': picWidth, 'max-height': picHeight }">
          </div>
          <div fxFlex></div>
          <div fxLayout="row" fxLayoutAlign="start center">
            <img width="34" height="34" [src]="'assets/images/favourite.png'">
            <div height="34" style="padding-left: 5px; font-size: 20px; font-weight: bold;">{{getFavouriteCount(item.uid)}}</div>
          </div>
        </mat-card>
      </div>
      </div>
    </div>
  </mat-drawer-content>

</mat-drawer-container>
